# ============================================================================
# AeroXe Bee - Nginx MQTT TLS Proxy
# Aeroxe Enterprises Pvt. Ltd., Jalgaon, Maharashtra, India
#
# Uses existing certbot (Let's Encrypt) certificates for bee-mqtt.nexoracrms.com.
# Add this to your production server's nginx.conf inside the `stream {}` block,
# or include it as a separate file.
#
# The stream block goes OUTSIDE the http {} block in nginx.conf.
# ============================================================================

# Add to /etc/nginx/nginx.conf (outside http block):
#   include /etc/nginx/conf.d/mqtt-nginx.conf;
#
# Or place directly in the stream {} block of nginx.conf.

stream {
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Upstream: plain MQTT broker (Mosquitto on port 1883)
    upstream mqtt_backend {
        server 127.0.0.1:1883;
    }

    # Upstream: plain MQTT WebSocket broker (Mosquitto on port 9001)
    upstream mqtt_ws_backend {
        server 127.0.0.1:9001;
    }

    # MQTT over TLS (port 8883)
    # Android release build connects here: ssl://bee-mqtt.nexoracrms.com:8883
    server {
        listen 8883 ssl;
        listen [::]:8883 ssl;

        # Certbot (Let's Encrypt) certificates
        ssl_certificate     /etc/letsencrypt/live/bee-mqtt.nexoracrms.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/bee-mqtt.nexoracrms.com/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:MQTT_SSL:10m;
        ssl_session_timeout 10m;

        proxy_pass mqtt_backend;
        proxy_connect_timeout 5s;
        proxy_timeout 7200s;
    }

    # MQTT over WebSocket TLS (port 9883) - optional, for web debug client
    server {
        listen 9883 ssl;
        listen [::]:9883 ssl;

        ssl_certificate     /etc/letsencrypt/live/bee-mqtt.nexoracrms.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/bee-mqtt.nexoracrms.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

        proxy_pass mqtt_ws_backend;
        proxy_connect_timeout 5s;
        proxy_timeout 7200s;
    }
}
