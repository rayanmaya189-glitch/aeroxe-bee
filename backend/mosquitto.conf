# ============================================================================
# AeroXe Bee Mosquitto Configuration
# Aeroxe Enterprises Pvt. Ltd., Jalgaon, Maharashtra, India
# Authentication via password file (managed by the backend Go service)
#
# Two TLS deployment modes:
#   Mode A (Recommended): Nginx terminates TLS on port 8883, proxies to Mosquitto:1883
#   Mode B: Mosquitto handles TLS directly on port 8883 (certbot certs mounted)
#
# This config supports both. The TLS listeners (8883/9883) will only work
# if the certbot certificates are mounted at /mosquitto/certs/.
# ============================================================================

# =============================================================================
# Listeners
# =============================================================================

# MQTT TCP listener (plain, for backend + nginx proxy)
listener 1883
protocol mqtt

# MQTT over TLS listener (Mode B: direct TLS, certbot certs)
# If using nginx proxy (Mode A), this listener is optional but harmless
listener 8883
protocol mqtt
cafile /mosquitto/certs/fullchain.pem
certfile /mosquitto/certs/fullchain.pem
keyfile /mosquitto/certs/privkey.pem
tls_version tlsv1.2
require_certificate false

# WebSocket listener (for web debug client)
listener 9001
protocol websockets

# WebSocket over TLS listener (certbot certs)
listener 9883
protocol websockets
cafile /mosquitto/certs/fullchain.pem
certfile /mosquitto/certs/fullchain.pem
keyfile /mosquitto/certs/privkey.pem
tls_version tlsv1.2

# =============================================================================
# Authentication
# =============================================================================
# Disable anonymous access — all clients must authenticate
allow_anonymous false

# Password file: maintained by the backend Go service
# Format per line: username:password
# Mosquitto hashes passwords at load time (PBKDF2-SHA512)
password_file /mosquitto/auth/passwords

# ACL file: restricts devices to their own topic tree
acl_file /mosquitto/auth/acl

# =============================================================================
# Connection Limits
# =============================================================================
# Maximum number of concurrent client connections
max_connections 1000

# Maximum number of clients connected simultaneously per listener
# (0 = unlimited, inherits max_connections)
# max_connections_per_listener 200

# =============================================================================
# Message Limits
# =============================================================================
# Maximum MQTT packet size allowed (bytes). 0 = no limit.
# 1MB limit prevents oversized messages from consuming broker memory
max_packet_size 1048576

# Maximum number of messages in-flight (QoS 1/2) per client before
# the broker pauses delivery. Prevents slow clients from blocking others.
max_inflight_messages 20

# Maximum number of queued messages per client when offline.
# Prevents memory exhaustion from offline clients accumulating messages.
max_queued_messages 1000

# =============================================================================
# Persistence & Logging
# =============================================================================
persistence true
persistence_location /mosquitto/data/

log_type all
log_dest stdout
connection_messages true
