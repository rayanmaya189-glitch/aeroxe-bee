version: "3.9"

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: aeroxebee
      POSTGRES_PASSWORD: aeroxebee
      POSTGRES_DB: aeroxebee
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
      - ./backend/migrations:/docker-entrypoint-initdb.d/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aeroxebee"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mosquitto:
    # Custom Mosquitto image with password-file auth managed by the backend
    build:
      context: ./backend
      dockerfile: mosquitto/Dockerfile
    ports:
      - "1883:1883"
      - "9001:9001"
    environment:
      MQTT_BACKEND_PASSWORD: e02afdd3b70dbd399c156a08278f70ac0c5eebe55619aafe188b5be764db9de4
      MQTT_DEVICE_PASSWORD: 1a0dd0d6a1899fac462303d0fac5804df106894da79440c5d27265123f0459ce
    volumes:
      - ./backend/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./backend/mosquitto/acl:/mosquitto/auth/acl
      - mqttdata:/mosquitto/data
      - mqtt_auth:/mosquitto/auth
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -t healthcheck -m ping -u backend -P $${MQTT_BACKEND_PASSWORD} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    
  backend:
    build: ./backend
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: aeroxebee
      DB_PASSWORD: aeroxebee
      DB_NAME: aeroxebee
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MQTT_BROKER: mosquitto
      MQTT_PORT: 1883
      MQTT_USERNAME: backend
      MQTT_PASSWORD: dev-backend-password
      MQTT_DEVICE_PASSWORD: dev-device-password
      JWT_SECRET: change-jwt-secret-in-production
      ENCRYPTION_MASTER_KEY: change-encryption-key-in-production-32bytes!
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000,http://10.10.13.148:5173,http://10.10.13.148:8080
      APP_ENV: development
    volumes:
      - mqtt_auth:/mosquitto/auth
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mosquitto:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
  mqttdata:
  mqtt_auth:
